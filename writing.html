<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing - Atharv Gupta</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .wip-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 88px 48px 80px;
            max-width: 680px;
        }
        .wip-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            color: var(--color-text-light);
            margin-bottom: 20px;
        }
        .wip-name {
            font-size: 48px;
            font-weight: 300;
            color: var(--color-dark-brown);
            letter-spacing: -0.5px;
            margin: 0 0 24px;
            line-height: 1.1;
        }
        .wip-note {
            font-size: 16px;
            color: var(--color-text-light);
            font-style: italic;
            line-height: 1.7;
            margin: 0 0 32px;
        }
        .wip-link {
            font-size: 14px;
            color: var(--color-dark-olive);
            text-decoration: none;
            border-bottom: 1px solid rgba(107,120,71,0.3);
            padding-bottom: 1px;
            transition: border-color 0.2s;
        }
        .wip-link:hover { border-color: var(--color-dark-olive); }
        @media (max-width: 768px) {
            .wip-container { padding: 76px 20px 60px; }
            .wip-name { font-size: 36px; }
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">Atharv Gupta</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="writing.html" class="active">Writing</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="wip-container fade-in">
        <p class="wip-label">Work in progress</p>
        <h1 class="wip-name">Writing</h1>
        <p class="wip-note">This page is being updated. In the meantime, feel free to get in touch.</p>
        <a href="contact.html" class="wip-link">Contact &rarr;</a>
    </div>

    <script>
        window.addEventListener('load', () => {
            document.querySelectorAll('.fade-in').forEach((el, i) => {
                setTimeout(() => {
                    el.style.opacity = '0';
                    el.style.animation = 'fadeInUp 0.6s ease forwards';
                }, i * 100);
            });
        });
    </script>
</body>
</html>
